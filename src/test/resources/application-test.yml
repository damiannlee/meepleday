spring:
  datasource:
    # Clean H2 (no dev seed data) in PostgreSQL-compatibility mode; per-test-class isolation via random db name.
    url: jdbc:h2:mem:meepleday-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          # Dummy values so ClientRegistrationRepository wires up without real IdP credentials;
          # tests never actually complete an OAuth handshake.
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
